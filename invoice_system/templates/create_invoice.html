{% extends "base.html" %}
{% block content %}
<div class="navbar">
    <span>Welcome, {{ user.full_name }}</span>
    <div>
        <a href="/dashboard">Dashboard</a>
        <a href="/logout">Logout</a>
    </div>
</div>

<h2>Create Invoice</h2>
<form method="POST">
    <label>Customer Name</label>
    <input type="text" name="customer_name" required>

    <label>Customer Address</label>
    <input type="text" name="customer_address" required>

    <label>Phone Number</label>
    <input type="text" name="phone" required>

    <label>NTN Number</label>
    <input type="text" name="ntn">

    <label>GST Number</label>
    <input type="text" name="gst">

    <label>Invoice No</label>
    <input type="text" name="invoice_no" required>

    <label>Date</label>
    <input type="date" name="date" required>

    <label>PO Number</label>
    <input type="text" name="po_number">

    <h3>Products</h3>
    <div id="products">
        <div class="product-row">
            <input type="text" name="product_name[]" placeholder="Product Name" required>
            <input type="number" name="qty[]" placeholder="Quantity" required>
            <input type="number" step="0.01" name="unit_cost[]" placeholder="Unit Cost" required>
        </div>
    </div>
    <button type="button" onclick="addProduct()">Add Product</button><br><br>
    <button type="submit">Create Invoice</button>
</form>

<script>
function addProduct() {
    const div = document.createElement('div');
    div.className = 'product-row';
    div.innerHTML = `<input type="text" name="product_name[]" placeholder="Product Name" required>
                     <input type="number" name="qty[]" placeholder="Quantity" required>
                     <input type="number" step="0.01" name="unit_cost[]" placeholder="Unit Cost" required>`;
    document.getElementById('products').appendChild(div);
}
</script>
{% endblock %}

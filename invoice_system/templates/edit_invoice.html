{% extends "base.html" %}
{% block content %}
<div class="navbar">
    <span>Welcome, {{ user.full_name }}</span>
    <div>
        <a href="/dashboard">Dashboard</a>
        <a href="/logout">Logout</a>
    </div>
</div>

<h2>Edit Invoice</h2>
<form method="POST">
    <label>Customer Name</label>
    <input type="text" name="customer_name" value="{{ invoice.customer_name }}" required>

    <label>Customer Address</label>
    <input type="text" name="customer_address" value="{{ invoice.customer_address }}" required>

    <label>Phone Number</label>
    <input type="text" name="phone" value="{{ invoice.phone }}" required>

    <label>NTN Number</label>
    <input type="text" name="ntn" value="{{ invoice.ntn }}">

    <label>GST Number</label>
    <input type="text" name="gst" value="{{ invoice.gst }}">

    <label>Invoice No</label>
    <input type="text" name="invoice_no" value="{{ invoice.invoice_no }}" required>

    <label>Date</label>
    <input type="date" name="date" value="{{ invoice.date }}" required>

    <label>PO Number</label>
    <input type="text" name="po_number" value="{{ invoice.po_number }}">

    <h3>Products</h3>
    <div id="products">
        {% for product in products %}
        <div class="product-row">
            <input type="text" name="product_name[]" value="{{ product.product_name }}" required>
            <input type="number" name="qty[]" value="{{ product.qty }}" required>
            <input type="number" step="0.01" name="unit_cost[]" value="{{ product.unit_cost }}" required>
        </div>
        {% endfor %}
    </div>
    <button type="button" onclick="addProduct()">Add Product</button><br><br>
    <button type="submit">Update Invoice</button>
</form>

<script>
function addProduct() {
    const div = document.createElement('div');
    div.className = 'product-row';
    div.innerHTML = `<input type="text" name="product_name[]" placeholder="Product Name" required>
                     <input type="number" name="qty[]" placeholder="Quantity" required>
                     <input type="number" step="0.01" name="unit_cost[]" placeholder="Unit Cost" required>`;
    document.getElementById('products').appendChild(div);
}
</script>
{% endblock %}
